<script>
var ALL = JSON.parse(document.getElementById('_d').textContent);
var TEAMS = ["Todos","Onboarding","Traction","Legacy/Integrations","QA","Tech Product","Shared Services","Infraestructura","Client Management/Finance & Accounting","Delivery","Sin equipo"];
var curTeam = "Todos";
var AC = ["#e6f1fb","#eaf3de","#faeeda","#eeedfe","#faece7","#fbeaf0"];
var AT = ["#0c447c","#27500a","#633806","#3c3489","#712b13","#72243e"];

function ini(n){return n.split(" ").slice(0,2).map(function(w){return w[0];}).join("").toUpperCase();}
function avc(n){var i=n.charCodeAt(0)%6;return "background:"+AC[i]+";color:"+AT[i]+";";}
function sl(st){
  var m={"[IN PROGRESS]":"In Progress","[BLOCKED]":"Blocked","[RETURNED]":"Returned","[TO DO]":"To Do",
    "[FINISHED]":"Finished","[CANCELED]":"Canceled","[SOLVED]":"Solved","[READY FOR TESTING]":"Rdy Test",
    "[IN TESTING]":"In Testing","En curso":"En curso","Escalated":"Escalated","Pending":"Pending",
    "Waiting for customer":"Wtg Customer","Waiting for support":"Wtg Support","Waiting for approval":"Wtg Approval","Resolved":"Resolved"};
  return m[st]||st;
}
function sch(st,board){
  if(board==="SER"||board==="DEV"){
    if(st==="En curso")return "ch cenc";if(st==="Escalated")return "ch cesc";
    if(st==="Pending")return "ch cpen";if(st.indexOf("Waiting")===0)return "ch cwf";return "ch cs";
  }
  if(st==="[IN PROGRESS]")return "ch cp";if(st==="[BLOCKED]")return "ch cb";
  if(st==="[RETURNED]")return "ch cr";if(st==="[TO DO]")return "ch ct";
  if(st==="[FINISHED]"||st==="[SOLVED]"||st==="[CANCELED]")return "ch cf";return "ch cs";
}
function ab(issues,board){
  var c={};
  issues.filter(function(i){return i.board===board;}).forEach(function(i){c[i.status]=(c[i.status]||0)+1;});
  return c;
}
function chH(counts,board){
  return Object.keys(counts).map(function(st){
    return "<span class='"+sch(st,board)+"'>"+counts[st]+" "+sl(st)+"</span>";
  }).join("");
}
function render(){
  var list=curTeam==="Todos"?ALL:ALL.filter(function(p){return p.team===curTeam;});
  var pillsHtml=TEAMS.map(function(t,i){
    var lbl=t==="Client Management/Finance & Accounting"?"Client Mgmt":t;
    return "<button class='pill"+(t===curTeam?" on":"")+"' onclick='ST("+i+")'>"+lbl+"</button>";
  }).join("");
  document.getElementById("pills").innerHTML=pillsHtml;
  if(!list.length){
    document.getElementById("grid").innerHTML="<div style='grid-column:1/-1;text-align:center;padding:2rem;color:#aaa;'>Sin personas.</div>";
    return;
  }
  document.getElementById("grid").innerHTML=list.map(function(p,i){return cH(p,i);}).join("");
}
function ST(i){curTeam=TEAMS[i];document.getElementById("det").innerHTML="";render();}
function cH(p,idx){
  var s=p.stats;
  var req=ab(p.issues,"REQ"),ser=ab(p.issues,"SER"),dev=ab(p.issues,"DEV");
  var hR=Object.keys(req).length>0,hS=Object.keys(ser).length>0,hD=Object.keys(dev).length>0;
  var lh=s.log_h,rh=Math.max(0,s.est_h-lh);
  var lp=Math.min(lh/160*100,100).toFixed(1),rp=Math.min(rh/160*100,100).toFixed(1);
  var over=lh>s.est_h&&s.est_h>0,logC=over?"#e24b4a":"#1d9e75";
  var h="<div class='pc' id='pc"+idx+"' onclick='SC("+idx+")'>";
  h+="<div style='display:flex;align-items:center;gap:8px;margin-bottom:8px;'>";
  h+="<div class='av' style='"+avc(p.name)+"'>"+ini(p.name)+"</div>";
  h+="<div><div class='pname'>"+p.name+"</div><div class='pteam'>"+p.team+"</div></div></div>";
  h+="<div style='display:flex;justify-content:space-between;font-size:9.5px;color:#999;margin-bottom:3px;'>";
  h+="<span>"+s.total+" issues &middot; "+s.est_h.toFixed(1)+"h</span></div>";
  h+="<div class='bw'><div style='width:"+lp+"%;background:"+logC+";height:100%;'></div>";
  h+="<div style='width:"+rp+"%;background:#f0a500;height:100%;opacity:.7;'></div></div>";
  h+="<div class='bl2'><span style='color:"+logC+";'>&#9632; "+lh.toFixed(1)+"h log</span>";
  h+="<span style='color:#f0a500;'>&#9632; "+rh.toFixed(1)+"h rest</span><span>/ 160h</span></div>";

    h+="<div class='ib'><div style='flex:"+s.capex_pct+";background:#378add;'></div>";
    h+="<div style='flex:"+s.opex_pct+";background:#f0a500;'></div></div>";
    h+="<div class='il'><span style='color:#378add;font-weight:600;'>&#9632;CAP "+s.capex_pct+"%</span> ";
    h+="<span style='color:#f0a500;font-weight:600;'>&#9632;OPE "+s.opex_pct+"%</span></div>";
  }
  h+="<div class='dv'></div>";
  if(hR)h+="<div class='br'><span class='bl lreq'>REQ</span><div class='chips'>"+chH(req,"REQ")+"</div></div>";
  if(hS)h+="<div class='br'><span class='bl lser'>SER</span><div class='chips'>"+chH(ser,"SER")+"</div></div>";
  if(hD)h+="<div class='br'><span class='bl ldev'>DEV</span><div class='chips'>"+chH(dev,"DEV")+"</div></div>";
  h+="</div>";return h;
}
function SC(idx){
  document.querySelectorAll(".pc").forEach(function(c,j){c.classList.toggle("sel",j===idx);});
  var list=curTeam==="Todos"?ALL:ALL.filter(function(p){return p.team===curTeam;});
  rD(list[idx]);
  document.getElementById("det").scrollIntoView({behavior:"smooth",block:"nearest"});
}
var SOR=["[IN PROGRESS]","En curso","[BLOCKED]","Escalated","[RETURNED]","Pending",
  "Waiting for customer","Waiting for support","Waiting for approval",
  "[TO DO]","[READY FOR TESTING]","[IN TESTING]","[FINISHED]","Resolved","[SOLVED]","[CANCELED]"];
var SDOT={"[IN PROGRESS]":"dp","[BLOCKED]":"db","[RETURNED]":"dret","[TO DO]":"dt",

function rD(p){
  var s=p.stats;
  var lh=s.log_h,rh=Math.max(0,s.est_h-lh),over=lh>s.est_h&&s.est_h>0,logC=over?"#e24b4a":"#1d9e75";
  var lp=Math.min(lh/160*100,100).toFixed(1),rp=Math.min(rh/160*100,100).toFixed(1);
  var grp={};SOR.forEach(function(st){grp[st]=[];});
  p.issues.forEach(function(i){if(grp[i.status])grp[i.status].push(i);else grp[i.status]=[i];});
  var iss="";
  SOR.forEach(function(st){
    var items=grp[st]||[];if(!items.length)return;
    iss+="<div class='sec'><div class='slbl'><span class='sdot "+(SDOT[st]||"dc")+"'></span>"+sl(st)+" <span style='opacity:.4;font-weight:400'>("+items.length+")</span></div>";
    items.forEach(function(i){
      var bpc=i.board==="SER"?"pser":i.board==="DEV"?"pdev":"preq";
      var dbl="";
      if((i.status==="[BLOCKED]"||i.status==="Escalated")&&i.days_in_status>0){
        var dc=i.days_in_status>5?"#e24b4a":i.days_in_status>2?"#ba7517":"#888";
        dbl="<span class='dblock' style='color:"+dc+";'>"+i.days_in_status+"d bloq</span>";
      }
      iss+="<div class='irow'>";
      iss+="<div><div class='ikey'><a href='https://lineru.atlassian.net/browse/"+i.key+"' target='_blank'>"+i.key+"</a></div>";
      iss+="<span class='iproj "+bpc+"'>"+i.proj+"</span></div>";
      iss+="<div><div class='ititle'>"+i.summary+dbl+"</div></div>";
      iss+="<div class='tc'><div class='tn'>"+(i.est>0?(i.est/3600).toFixed(1)+"h":"&mdash;")+"</div>";
      if(i.log>0)iss+="<div style='font-size:9px;color:#aaa;'>log "+(i.log/3600).toFixed(1)+"h</div>";
      iss+="</div></div>";
    });
    iss+="</div>";
  });
  var h="<div class='det'>";
  h+="<div class='dh'><div class='dav' style='"+avc(p.name)+"'>"+ini(p.name)+"</div>";
  h+="<div><div class='dn'>"+p.name+"</div><div class='dm'>"+p.team+" &middot; "+s.total+" issues</div></div></div>";
  h+="<div class='mrow'>";
  h+="<div class='m'><div class='ml'>Estimado</div><div class='mv'>"+s.est_h.toFixed(1)+"h</div><div class='ms'>"+Math.min(s.est_h/160*100,999).toFixed(0)+"% de 160h</div></div>";
  h+="<div class='m'><div class='ml'>Logueado</div><div class='mv' style='color:"+logC+"'>"+lh.toFixed(1)+"h</div><div class='ms'>"+(over?"excedido":"registrado")+"</div></div>";
  h+="<div class='m'><div class='ml'>Restante</div><div class='mv' style='color:#f0a500'>"+rh.toFixed(1)+"h</div><div class='ms'>por ejecutar</div></div>";
  h+="<div class='m'><div class='ml'>Bloqueados</div><div class='mv' style='color:"+(s.blocked>0?"#e24b4a":"#1a1a1a")+"'>"+s.blocked+"</div><div class='ms'>requieren acción</div></div>";
  h+="<div class='m'><div class='ml'>Terminados</div><div class='mv' style='color:#1d9e75'>"+s.done+"</div><div class='ms'>de "+s.total+"</div></div>";
  h+="<div class='m'><div class='ml'>REQ/SER/DEV</div><div class='mv'>"+s.req+"/"+s.ser+"/"+s.dev+"</div><div class='ms'>tickets</div></div>";
  if(s.capex_pct+s.opex_pct>0){
    h+="<div class='m'><div class='ml'>CAPEX/OPEX</div>";
    h+="<div style='height:8px;border-radius:4px;overflow:hidden;display:flex;margin-top:5px;'>";
    h+="<div style='flex:"+s.capex_pct+";background:#378add;'></div>";
    h+="<div style='flex:"+s.opex_pct+";background:#f0a500;'></div></div>";
    h+="<div class='ms' style='margin-top:4px;'><span style='color:#378add;font-weight:600;'>"+s.capex_pct+"% ("+s.capex_h+"h)</span> ";
    h+="<span style='color:#f0a500;font-weight:600;'>"+s.opex_pct+"% ("+s.opex_h+"h)</span></div></div>";
  }
  h+="</div>";
  h+="<div style='margin-bottom:.75rem;'>";
  h+="<div style='height:8px;background:#f0f0ec;border-radius:4px;overflow:hidden;display:flex;'>";
  h+="<div style='width:"+lp+"%;background:"+logC+";'></div>";
  h+="<div style='width:"+rp+"%;background:#f0a500;opacity:.7;'></div></div>";
  h+="<div style='display:flex;justify-content:space-between;font-size:10px;color:#888;margin-top:4px;'>";
  h+="<span style='color:"+logC+";font-weight:600;'>&#9632; Logueado: "+lh.toFixed(1)+"h</span>";
  h+="<span style='color:#f0a500;font-weight:600;'>&#9632; Restante: "+rh.toFixed(1)+"h</span>";
  h+="<span>Libre: "+Math.max(0,160-lh-rh).toFixed(1)+"h / 160h</span></div></div>";
  h+=iss+"</div>";
  document.getElementById("det").innerHTML=h;
}
render();
</script>
</body>
</html>
